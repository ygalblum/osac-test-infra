---
name: Setup E2E Runner
description: >-
  Consolidates common E2E setup: compute clone name, checkout, read Vault
  credentials via AppRole, retrieve secrets, and write pull-secret / AAP
  license to disk.

inputs:
  test-suite:
    description: "Test suite name (used in clone-name prefix)"
    required: false
    default: "e2e"
  run-id:
    description: "GitHub run ID (used in clone-name suffix)"
    required: true
  checkout-repository:
    description: "Repository to checkout (default: caller's repository). Set to osac-project/osac-test-infra for cross-repo calls."
    required: false
    default: ""
  checkout-ref:
    description: "Git ref to checkout (default: caller's ref)"
    required: false
    default: ""

outputs:
  clone-name:
    description: "Cluster clone name"
    value: ${{ steps.clone-name.outputs.clone-name }}
  pull-secret-path:
    description: "Path to pull-secret.json"
    value: ${{ steps.secrets.outputs.pull-secret-path }}
  aap-license-path:
    description: "Path to aap-license.zip"
    value: ${{ steps.secrets.outputs.aap-license-path }}

runs:
  using: composite
  steps:
    - name: Set clone name
      id: clone-name
      shell: bash
      run: |
        # Bridge name = br- + first 8 chars of clone name (cluster-tool).
        # Use 1-char suite prefix + last 7 digits of run ID so bridges
        # are unique across suites (vmaas vs caas in same run) and
        # across runs (same suite in different PRs).
        SUITE="${{ inputs.test-suite }}"
        RUN_ID="${{ inputs.run-id }}"
        CLONE_NAME="${SUITE:0:1}${RUN_ID: -7}-${SUITE}"
        echo "CLONE_NAME=${CLONE_NAME}" >> "$GITHUB_ENV"
        echo "clone-name=${CLONE_NAME}" >> "$GITHUB_OUTPUT"

    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: ${{ inputs.checkout-repository || github.repository }}
        ref: ${{ inputs.checkout-ref || '' }}
        persist-credentials: false

    - name: Read AppRole credentials
      id: approle
      shell: bash
      run: |
        APPROLE_DIR="${HOME}/.vault-server/.approle"
        echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
        echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
        echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

    - name: Retrieve secrets from Vault
      id: vault
      uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
      with:
        url: http://127.0.0.1:8200
        method: approle
        roleId: ${{ steps.approle.outputs.role-id }}
        secretId: ${{ steps.approle.outputs.secret-id }}
        exportEnv: false
        secrets: |
          secret/data/osac/e2e/pull-secret dockerconfigjson | PULL_SECRET ;
          secret/data/osac/e2e/aap-license license | AAP_LICENSE

    - name: Set up registry auth and write secrets
      id: secrets
      shell: bash
      env:
        PULL_SECRET: ${{ steps.vault.outputs.PULL_SECRET }}
        AAP_LICENSE: ${{ steps.vault.outputs.AAP_LICENSE }}
      run: |
        # Set up podman registry auth for flavor pull and test image pulls
        mkdir -p "${HOME}/.config/containers"
        printf '%s' "${PULL_SECRET}" > "${HOME}/.config/containers/auth.json"
        chmod 600 "${HOME}/.config/containers/auth.json"

        # Write secrets for test container mounts
        printf '%s' "${PULL_SECRET}" > "$RUNNER_TEMP/pull-secret.json"
        chmod 600 "$RUNNER_TEMP/pull-secret.json"

        printf '%s' "${AAP_LICENSE}" | base64 -d > "$RUNNER_TEMP/aap-license.zip"
        chmod 600 "$RUNNER_TEMP/aap-license.zip"

        echo "pull-secret-path=$RUNNER_TEMP/pull-secret.json" >> "$GITHUB_OUTPUT"
        echo "aap-license-path=$RUNNER_TEMP/aap-license.zip" >> "$GITHUB_OUTPUT"
